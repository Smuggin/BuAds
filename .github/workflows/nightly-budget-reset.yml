name: nightly-budget-reset

# Fires the ฿300 nightly budget reset at exactly 00:00 Asia/Bangkok (= 17:00 UTC).
# Every run — scheduled or manual — performs the REAL reset (POST). Scheduled runs are
# triggered 10 min early (off the busy top-of-hour, where GitHub's scheduler lags most)
# and then sleep until the exact target second before calling the endpoint; a manual
# run fires immediately. Auth is the CRON_SECRET the route already checks — it lives only
# in an encrypted GitHub secret, never in this file.

on:
  schedule:
    - cron: "50 16 * * *" # 16:50 UTC = 23:50 Asia/Bangkok (job waits to 17:00:00 UTC)
  workflow_dispatch: {} # manual trigger = real reset, immediately

concurrency:
  group: nightly-budget-reset
  cancel-in-progress: false

jobs:
  reset:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger budget reset at 00:00 Asia/Bangkok
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          url="https://buads.vercel.app/api/cron/daily"

          # On the schedule, wait until exactly 17:00:00 UTC (00:00:00 ICT). If GitHub
          # fired us late (already past target), skip the wait and call immediately.
          # Manual runs (workflow_dispatch) skip the wait and reset right away.
          if [ "$EVENT" = "schedule" ]; then
            target=$(date -u -d 'today 17:00:00' +%s)
            now=$(date -u +%s)
            if [ "$now" -lt "$target" ]; then
              echo "Waiting $((target - now))s until 00:00 Asia/Bangkok…"
              sleep "$((target - now))"
            else
              echo "Trigger arrived $((now - target))s after target — calling now."
            fi
          fi

          echo "[$(date -u +%FT%TZ) UTC] POST $url"
          code=$(curl -sS --retry 2 --retry-delay 10 --max-time 90 \
            -o /tmp/resp.json -w '%{http_code}' \
            -X POST -H "Authorization: Bearer ${CRON_SECRET}" "$url" || echo "000")
          echo "HTTP $code"
          echo "Response body:"; head -c 2000 /tmp/resp.json 2>/dev/null || true; echo
          if [ "$code" != "200" ]; then
            echo "::error::budget reset call failed (HTTP $code)"
            exit 1
          fi
